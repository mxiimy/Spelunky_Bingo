name: Deploy React app to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install frontend deps
        run: npm install
        working-directory: frontend

      - name: Validate API base URL
        run: |
          EFFECTIVE_API_BASE_URL="${VITE_API_BASE_URL_VAR:-$VITE_API_BASE_URL_SECRET}"

          if [ -z "$EFFECTIVE_API_BASE_URL" ]; then
            echo "VITE_API_BASE_URL is missing. Set it as a repo/environment variable or secret."
            exit 1
          fi

          echo "EFFECTIVE_API_BASE_URL=$EFFECTIVE_API_BASE_URL" >> "$GITHUB_ENV"
        env:
          VITE_API_BASE_URL_VAR: ${{ vars.VITE_API_BASE_URL }}
          VITE_API_BASE_URL_SECRET: ${{ secrets.VITE_API_BASE_URL }}

      - name: Build frontend
        run: VITE_API_BASE_URL="$EFFECTIVE_API_BASE_URL" npm run build
        working-directory: frontend

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
